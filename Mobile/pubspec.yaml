name: transit_op
description: TransitOps - Smart Transport Operations Platform
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  get_it: ^8.0.3

  # Networking
  dio: ^5.8.0+1

  # Routing
  go_router: ^15.1.2


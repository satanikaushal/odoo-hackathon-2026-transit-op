  equatable: ^2.0.7
  intl: ^0.20.2
  shimmer: ^3.0.0
  firebase_core: ^4.11.0
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  firebase_messaging: ^16.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

services:
  postgres:
    image: postgres:16
    container_name: transitops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - transitops_pg_data:/var/lib/postgresql/data
      - ./docker/init-shadow-db.sql:/docker-entrypoint-initdb.d/init-shadow-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: transitops-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - transitops_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  transitops_pg_data:
    name: transitops_pg_data
  transitops_redis_data:
    name: transitops_redis_data
